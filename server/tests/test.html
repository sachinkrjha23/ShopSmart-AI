<!DOCTYPE html>
<html>
<body>
  <button onclick="pay()">Pay Now</button>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    function pay() {
      const options = {
        key: "rzp_test_T68IXEz7qzXHYi",
        amount: 880000,                        
        currency: "INR",
        order_id: "order_T7Ajf0ho7qxe34",
        name: "ShopSmart AI",
        handler: function(response) {
          document.body.innerHTML = `
            <p>payment_id: ${response.razorpay_payment_id}</p>
            <p>order_id: ${response.razorpay_order_id}</p>
            <p>signature: ${response.razorpay_signature}</p>
          `;
        }
      };
      const rzp = new window.Razorpay(options);
      rzp.open();
    }
  </script>
</body>
</html>
